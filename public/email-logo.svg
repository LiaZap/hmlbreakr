<svg xmlns="http://www.w3.org/2000/svg" width="440" height="140" viewBox="0 0 440 140">
  <defs>
    <linearGradient id="breakrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5232A"/>
      <stop offset="55%" stop-color="#F26B1F"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Fundo preto arredondado -->
  <rect width="440" height="140" rx="20" fill="#000000"/>

  <!-- Bolt + "breakr" — wordmark com gradiente vermelho->laranja -->
  <g transform="translate(34 30)">
    <!-- Raio integrado (lightning bolt) -->
    <path d="M22.9 51.2H40.1L36.1 68.1H2.7L17 0h51.2l-5 16.6h21l-34.1 68.6H18l25.8-51.8H29.3l3.9-16.6H15z" fill="url(#breakrGrad)"/>
    <!-- "reakr" continuação -->
    <text x="78" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="800" fill="url(#breakrGrad)" letter-spacing="-2">reakr</text>
    <!-- Símbolo ® -->
    <text x="290" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="url(#breakrGrad)">®</text>
  </g>

  <!-- Tagline -->
  <text x="220" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" fill="#E8E8E8" text-anchor="middle" letter-spacing="2">ASSESSORIA GASTRONÔMICA</text>
</svg>
